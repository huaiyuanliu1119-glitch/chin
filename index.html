<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序</title>
    <script>
        // 氣泡排序函式
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // 交換元素
                        let temp = arr[j];
                        arr[j] = arr[j + 1];
                        arr[j + 1] = temp;
                    }
                }
            }
            return arr;
        }

        // 執行排序並顯示結果
        function sortAndDisplay() {
            let data = [64, 34, 25, 12, 22, 11, 90];
            document.getElementById("original").textContent = "原始資料: " + data.join(", ");
            let sortedData = bubbleSort(data);
            document.getElementById("sorted").textContent = "排序後資料: " + sortedData.join(", ");
        }
    </script>
</head>
<body>
    <h1>氣泡排序範例</h1>
    <p id="original">原始資料: </p>
    <p id="sorted">排序後資料: </p>
    <button onclick="sortAndDisplay()">執行排序</button>
</body>
</html>
